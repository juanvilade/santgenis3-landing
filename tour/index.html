<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

// ═══════════════════════════════════════════════════════════
//  DEVICE DETECTION
// ═══════════════════════════════════════════════════════════
const isMobile = ('ontouchstart' in window || navigator.maxTouchPoints > 0) && window.innerWidth <= 1024;

// ═══════════════════════════════════════════════════════════
//  CONSTANTS  — from CAD DWG (Puerta 1ª, pisos 2-3)
// ═══════════════════════════════════════════════════════════
const H  = 2.80;   // interior wall height (3.10m floor-to-floor minus 0.30m slab)
const ET = 0.30;   // exterior / structural wall thickness
const PT = 0.20;   // interior partition wall thickness
const DW = 0.90;   // door width
const DH = 2.10;   // door height
const PR = 0.28;   // player collision radius

// ── CAD-accurate room definitions ──
// World coordinates: X=west→east, Z=south(terrace)→north(bedrooms), Y=up
// All in metres. Room boundaries are interior (not wall centreline).
const ROOM_DEFS = {
  salon:     { x0:0.30, x1:5.30, z0:0.30, z1:4.30, name:'Salón Comedor',        col:'#d4a574' },
  cocina:    { x0:5.50, x1:8.55, z0:0.30, z1:2.30, name:'Cocina',               col:'#e8c090' },
  recibidor: { x0:5.50, x1:8.70, z0:2.50, z1:4.50, name:'Recibidor',            col:'#d4a574' },
  paso:      { x0:3.85, x1:5.50, z0:4.50, z1:5.50, name:'Distribuidor',         col:'#d4a574' },
  bano1:     { x0:5.50, x1:8.00, z0:4.50, z1:6.20, name:'Baño',                 col:'#8a9a9a' },
  dorm1:     { x0:0.30, x1:3.85, z0:4.50, z1:7.50, name:'Dormitorio Principal', col:'#d4a574' },
  aseo:      { x0:5.50, x1:7.25, z0:6.40, z1:8.00, name:'Aseo',                 col:'#8a9a9a' },
  dorm2:     { x0:0.30, x1:3.30, z0:7.70, z1:9.80, name:'Dormitorio 2',         col:'#d4a574' },
  terraza:   { x0:0.15, x1:4.80, z0:-2.0, z1:0.00, name:'Terraza · Vistas',     col:'#7aaa8a' },
};

// ═══════════════════════════════════════════════════════════
//  RENDERER / SCENE / CAMERA
// ═══════════════════════════════════════════════════════════
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, isMobile ? 1.5 : 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
renderer.domElement.id = 'c';
document.body.insertBefore(renderer.domElement, document.body.firstChild);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.05, 200);

// ═══════════════════════════════════════════════════════════
//  PROCEDURAL TEXTURES
// ═══════════════════════════════════════════════════════════
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function makeWoodGrainTexture(sz = 512) {
  const c = document.createElement('canvas'); c.width = c.height = sz;
  const ctx = c.getContext('2d');
  const bg = ctx.createLinearGradient(0,0,sz,sz);
  bg.addColorStop(0,'#ddb070'); bg.addColorStop(0.3,'#d4a574');
  bg.addColorStop(0.7,'#c89660'); bg.addColorStop(1,'#d8aa78');
  ctx.fillStyle = bg; ctx.fillRect(0,0,sz,sz);
  const rng = mulberry32(42);
  for (let i=0;i<320;i++) {
    const y0=rng()*sz,wave=(rng()-.5)*18,freq=0.008+rng()*0.012,lw=0.4+rng()*1.8,alpha=0.04+rng()*0.14,dark=rng()>.55;
    ctx.save(); ctx.beginPath(); ctx.moveTo(0,y0);
    for (let x=0;x<=sz;x+=4) ctx.lineTo(x, y0+Math.sin(x*freq)*wave+Math.sin(x*freq*3.1)*(wave*.3));
    ctx.strokeStyle = dark?`rgba(90,50,15,${alpha})`:`rgba(240,190,110,${alpha})`;
    ctx.lineWidth=lw; ctx.stroke(); ctx.restore();
  }
  for (let i=0;i<2;i++){
    const kx=rng()*sz,ky=rng()*sz;
    const gr=ctx.createRadialGradient(kx,ky,0,kx,ky,25+rng()*20);
    gr.addColorStop(0,'rgba(70,35,10,0.35)'); gr.addColorStop(0.5,'rgba(90,50,20,0.15)'); gr.addColorStop(1,'rgba(90,50,20,0)');
    ctx.fillStyle=gr; ctx.fillRect(0,0,sz,sz);
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping; tex.colorSpace = THREE.SRGBColorSpace; return tex;
}

function makeTileTexture(sz=512, tileCount=4, tileCol='#8a8a8a', groutCol='#6a6a6a') {
  const c=document.createElement('canvas'); c.width=c.height=sz;
  const ctx=c.getContext('2d'), ts=sz/tileCount, grout=3, rng=mulberry32(17);
  ctx.fillStyle=groutCol; ctx.fillRect(0,0,sz,sz);
  for (let row=0;row<tileCount;row++) for (let col=0;col<tileCount;col++) {
    const tx=col*ts+grout,ty=row*ts+grout,tw=ts-grout*2,th=ts-grout*2,v=(rng()-.5)*18;
    const r0=parseInt(tileCol.slice(1,3),16),g0=parseInt(tileCol.slice(3,5),16),b0=parseInt(tileCol.slice(5,7),16);
    const r=Math.max(0,Math.min(255,r0+v))|0,g=Math.max(0,Math.min(255,g0+v))|0,b=Math.max(0,Math.min(255,b0+v))|0;
    ctx.fillStyle=`rgb(${r},${g},${b})`; ctx.fillRect(tx,ty,tw,th);
    const hl=ctx.createLinearGradient(tx,ty,tx+tw,ty+th);
    hl.addColorStop(0,'rgba(255,255,255,0.07)'); hl.addColorStop(1,'rgba(0,0,0,0.06)');
    ctx.fillStyle=hl; ctx.fillRect(tx,ty,tw,th);
  }
  const tex=new THREE.CanvasTexture(c); tex.wrapS=tex.wrapT=THREE.RepeatWrapping; tex.colorSpace=THREE.SRGBColorSpace; return tex;
}

function makeOutdoorTileTexture(sz=512) {
  const c=document.createElement('canvas'); c.width=c.height=sz;
  const ctx=c.getContext('2d'), rng=mulberry32(31);
  ctx.fillStyle='#666'; ctx.fillRect(0,0,sz,sz);
  const cols=2,rows=3,tw=sz/cols,th=sz/rows,grout=4;
  for (let r=0;r<rows;r++) for (let cl=0;cl<cols;cl++) {
    const x=cl*tw+grout,y=r*th+grout,w=tw-grout*2,h=th-grout*2,v=(rng()-.5)*20;
    const b=Math.max(0,Math.min(255,0x7a+v))|0;
    ctx.fillStyle=`rgb(${b},${b},${b})`; ctx.fillRect(x,y,w,h);
    const hl=ctx.createLinearGradient(x,y,x+w,y+h);
    hl.addColorStop(0,'rgba(255,255,255,0.06)'); hl.addColorStop(1,'rgba(0,0,0,0.07)');
    ctx.fillStyle=hl; ctx.fillRect(x,y,w,h);
    for (let n=0;n<40;n++){const nx=x+rng()*w,ny=y+rng()*h,nv=(rng()-.5)*.1;ctx.fillStyle=`rgba(${nv>0?255:0},${nv>0?255:0},${nv>0?255:0},${Math.abs(nv)})`;ctx.fillRect(nx,ny,2,2);}
  }
  const tex=new THREE.CanvasTexture(c); tex.wrapS=tex.wrapT=THREE.RepeatWrapping; tex.colorSpace=THREE.SRGBColorSpace; return tex;
}

function makeLightTileTexture(sz=512) {
  // Bright white/cream tiles for bathroom
  const c=document.createElement('canvas'); c.width=c.height=sz;
  const ctx=c.getContext('2d'),rng=mulberry32(55);
  ctx.fillStyle='#c0c0c0'; ctx.fillRect(0,0,sz,sz);
  const tc=6,ts=sz/tc,grout=2;
  for (let row=0;row<tc;row++) for (let col=0;col<tc;col++){
    const tx=col*ts+grout,ty=row*ts+grout,tw=ts-grout*2,th=ts-grout*2;
    const v=(rng()-.5)*12, base=0xee+v;
    const b=Math.max(200,Math.min(255,base))|0;
    ctx.fillStyle=`rgb(${b},${b},${b-4})`; ctx.fillRect(tx,ty,tw,th);
    const hl=ctx.createLinearGradient(tx,ty,tx+tw,ty+th);
    hl.addColorStop(0,'rgba(255,255,255,0.08)'); hl.addColorStop(1,'rgba(0,0,0,0.04)');
    ctx.fillStyle=hl; ctx.fillRect(tx,ty,tw,th);
  }
  const tex=new THREE.CanvasTexture(c); tex.wrapS=tex.wrapT=THREE.RepeatWrapping; tex.colorSpace=THREE.SRGBColorSpace; return tex;
}

// ── Generate all textures ──
const woodTex        = makeWoodGrainTexture(512);
const tileTex        = makeTileTexture(512,4,'#8a8a8a','#6a6a6a');
const lightTileTex   = makeLightTileTexture(512);
const outdoorTileTex = makeOutdoorTileTexture(512);
woodTex.repeat.set(4,4);
tileTex.repeat.set(3,3);
lightTileTex.repeat.set(5,5);
outdoorTileTex.repeat.set(4,3);

// ─── Glass texture ───
const glassTex = (() => {
  const c=document.createElement('canvas'); c.width=c.height=64; const ctx=c.getContext('2d');
  ctx.fillStyle='rgba(200,230,255,0.15)'; ctx.fillRect(0,0,64,64);
  const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; return t;
})();

// ═══════════════════════════════════════════════════════════
//  MATERIALS
// ═══════════════════════════════════════════════════════════
const MAT = {
  wall:     new THREE.MeshStandardMaterial({ color:0xf5f5f0, roughness:0.88, metalness:0.0 }),
  wallBath: new THREE.MeshStandardMaterial({ color:0xf0f0f5, roughness:0.30, metalness:0.1 }),
  ceil:     new THREE.MeshStandardMaterial({ color:0xffffff, roughness:0.95 }),
  floorW:   new THREE.MeshStandardMaterial({ map:woodTex,        roughness:0.65, metalness:0.05 }),
  floorT:   new THREE.MeshStandardMaterial({ map:tileTex,        roughness:0.45, metalness:0.15 }),
  floorLT:  new THREE.MeshStandardMaterial({ map:lightTileTex,   roughness:0.35, metalness:0.10 }),
  floorOT:  new THREE.MeshStandardMaterial({ map:outdoorTileTex, roughness:0.60, metalness:0.05 }),
  glass:    new THREE.MeshPhysicalMaterial({ map:glassTex, color:0xd0eeff, transparent:true, opacity:0.22, roughness:0.05, metalness:0.0, transmission:0.8, side:THREE.DoubleSide }),
  glassR:   new THREE.MeshPhysicalMaterial({ color:0xd0eeff, transparent:true, opacity:0.12, roughness:0.02, metalness:0.1, side:THREE.DoubleSide }),
  winFrame: new THREE.MeshStandardMaterial({ color:0x888888, roughness:0.4, metalness:0.3 }),
  doorMat:  new THREE.MeshStandardMaterial({ color:0xf0ede5, roughness:0.75 }),
  doorFrm:  new THREE.MeshStandardMaterial({ color:0xd8d5ce, roughness:0.7 }),
  kitcBase: new THREE.MeshStandardMaterial({ color:0xf5f5f5, roughness:0.8 }),
  kitcCTop: new THREE.MeshStandardMaterial({ color:0x3a3a3a, roughness:0.45, metalness:0.2 }),
  kitcHndl: new THREE.MeshStandardMaterial({ color:0x888888, roughness:0.3, metalness:0.6 }),
  sink:     new THREE.MeshStandardMaterial({ color:0xd0d0d0, roughness:0.3, metalness:0.6 }),
  sofa:     new THREE.MeshStandardMaterial({ color:0xe8e0d0, roughness:0.9 }),
  sofaDark: new THREE.MeshStandardMaterial({ color:0xd5cdc0, roughness:0.92 }),
  bed:      new THREE.MeshStandardMaterial({ color:0xfaf8f5, roughness:0.88 }),
  bedding:  new THREE.MeshStandardMaterial({ color:0xf0ece5, roughness:0.9 }),
  pillow:   new THREE.MeshStandardMaterial({ color:0xffffff, roughness:0.9 }),
  tableTop: new THREE.MeshStandardMaterial({ color:0xc8b898, roughness:0.7, metalness:0.05 }),
  tableLeg: new THREE.MeshStandardMaterial({ color:0x6a6055, roughness:0.6, metalness:0.1 }),
  metal:    new THREE.MeshStandardMaterial({ color:0x999999, roughness:0.3, metalness:0.7 }),
  chrome:   new THREE.MeshStandardMaterial({ color:0xd0d0d0, roughness:0.15, metalness:0.9 }),
  tvScr:    new THREE.MeshStandardMaterial({ color:0x0a0a0f, roughness:0.1, metalness:0.3, emissive:0x040408, emissiveIntensity:0.5 }),
  wardrobe: new THREE.MeshStandardMaterial({ color:0xeeebe4, roughness:0.75 }),
  wardSlide:new THREE.MeshStandardMaterial({ color:0xd8d5ce, roughness:0.4, metalness:0.2 }),
  ceramic:  new THREE.MeshStandardMaterial({ color:0xf5f5f5, roughness:0.2, metalness:0.05 }),
  shower:   new THREE.MeshPhysicalMaterial({ color:0xd8eeff, transparent:true, opacity:0.20, roughness:0.02, metalness:0.0, side:THREE.DoubleSide }),
  mirror:   new THREE.MeshStandardMaterial({ color:0xbbddee, roughness:0.03, metalness:0.95 }),
  wood:     new THREE.MeshStandardMaterial({ color:0xc09060, roughness:0.7 }),
  darkWood: new THREE.MeshStandardMaterial({ color:0x5a4030, roughness:0.7 }),

//  GEOMETRY HELPERS

const collidables = [];

function box(x, y, z, w, h, d, mat, opts={}) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat);
  m.position.set(x,y,z);
  if (opts.ry) m.rotation.y = opts.ry;
  m.castShadow    = opts.castShadow    !== false;
  m.receiveShadow = opts.receiveShadow !== false;
  scene.add(m);
  if (opts.collide) collidables.push({ minX:x-w*.5-PR, maxX:x+w*.5+PR, minZ:z-d*.5-PR, maxZ:z+d*.5+PR });
  return m;
}

function cylMesh(x,y,z,rt,rb,h,seg,mat,opts={}) {
  const m=new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,seg),mat);
  m.position.set(x,y,z); if(opts.ry) m.rotation.y=opts.ry; if(opts.rx) m.rotation.x=opts.rx;
  m.castShadow=m.receiveShadow=true; scene.add(m); return m;
}

function floor(x,z,w,d,mat,yOff=0) {
  const m=new THREE.Mesh(new THREE.PlaneGeometry(w,d),mat);
  m.rotation.x=-Math.PI/2; m.position.set(x,yOff,z); m.receiveShadow=true; scene.add(m); return m;
}

function ceiling(x,z,w,d) {
  const m=new THREE.Mesh(new THREE.PlaneGeometry(w,d),MAT.ceil);
  m.rotation.x=Math.PI/2; m.position.set(x,H,z); m.receiveShadow=true; scene.add(m); return m;
}

// Wall segment (solid, no openings)
// dir='x': wall runs along X (constant Z); dir='z': wall runs along Z (constant X)
function wallSolid(dir,fixed,start,end,y0,y1,mat,thick=PT) {
  if (end<=start||y1<=y0) return;
  const len=end-start, h=y1-y0;
  const cx=dir==='x'?(start+end)*.5:fixed;
  const cz=dir==='x'?fixed:(start+end)*.5;
  const w =dir==='x'?len:thick;
  const d =dir==='x'?thick:len;
  box(cx, y0+h*.5, cz, w, h, d, mat, {collide:true, castShadow:true});
}

// Wall with single door opening
function wallWithDoor(dir,fixed,start,end,doorStart,doorEnd,mat,thick=PT) {
  wallSolid(dir,fixed,start,doorStart,0,H,mat,thick);
  wallSolid(dir,fixed,doorStart,doorEnd,DH,H,mat,thick);
  wallSolid(dir,fixed,doorEnd,end,0,H,mat,thick);
}

// Door frame visual
function doorFrame(dir,fixed,doorCenter,y0=0) {
  const fw=0.06,fd=0.08,dc=doorCenter;
  if (dir==='x'){
    box(dc-DW*.5,y0+DH*.5,fixed,fw,DH,fd,MAT.doorFrm,{collide:false,castShadow:false});
    box(dc+DW*.5,y0+DH*.5,fixed,fw,DH,fd,MAT.doorFrm,{collide:false,castShadow:false});
    box(dc,y0+DH+fw*.5,fixed,DW+fw*2,fw,fd,MAT.doorFrm,{collide:false,castShadow:false});
  } else {
    box(fixed,y0+DH*.5,dc-DW*.5,fd,DH,fw,MAT.doorFrm,{collide:false,castShadow:false});
    box(fixed,y0+DH*.5,dc+DW*.5,fd,DH,fw,MAT.doorFrm,{collide:false,castShadow:false});
    box(fixed,y0+DH+fw*.5,dc,fd,fw,DW+fw*2,MAT.doorFrm,{collide:false,castShadow:false});
  }
}

// Door panel
function doorPanel(dir,fixed,doorCenter,y0=0) {
  if(dir==='x') box(doorCenter,y0+DH*.5,fixed,DW-.04,DH-.03,PT+.02,MAT.doorMat,{castShadow:false,collide:false});
  else           box(fixed,y0+DH*.5,doorCenter,PT+.02,DH-.03,DW-.04,MAT.doorMat,{castShadow:false,collide:false});
}

// Wall with horizontal window
function wallWithWindow(dir,fixed,start,end,winStart,winEnd,winBot,winTop,mat,thick=ET) {
  wallSolid(dir,fixed,start,end,0,winBot,mat,thick);
  wallSolid(dir,fixed,start,end,winTop,H,mat,thick);
  wallSolid(dir,fixed,start,winStart,winBot,winTop,mat,thick);
  wallSolid(dir,fixed,winEnd,end,winBot,winTop,mat,thick);
  const len=winEnd-winStart, hh=winTop-winBot;
  const cx=dir==='x'?(winStart+winEnd)*.5:fixed;
  const cz=dir==='x'?fixed:(winStart+winEnd)*.5;
  const w=dir==='x'?len:0.04, d=dir==='x'?0.04:len;
  box(cx,winBot+hh*.5,cz,w,hh,d,MAT.glass,{castShadow:false,collide:false});
}

// Sky dome (gradient shader)
{
  const skyGeo = new THREE.SphereGeometry(90,32,16);
  const skyMat = new THREE.ShaderMaterial({
    vertexShader: `varying vec3 vPos; void main(){ vPos=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }`,
    fragmentShader: `
      varying vec3 vPos;
      void main(){
        float t = clamp(vPos.y/80.,0.,1.);
        vec3 top   = vec3(0.10,0.31,0.70);
        vec3 mid   = vec3(0.40,0.68,0.92);
        vec3 horiz = vec3(0.78,0.90,0.98);
        vec3 col   = mix(horiz,mix(mid,top,smoothstep(0.2,0.8,t)),smoothstep(0.,0.2,t));
        gl_FragColor = vec4(col,1.);
      }`,
    side: THREE.BackSide,
  });
  const sky=new THREE.Mesh(skyGeo,skyMat);
  sky.position.set(4.5, 0, -20);
  scene.add(sky);

  [6.75, H-.05, 5.35, 0xe8f0ff, 1.0, 2.8],
  // Dorm1
  [2.07, H-.05, 5.80, 0xfff0d0, 0.8, 4.0],
  [2.07, H-.05, 7.00, 0xfff0d0, 0.6, 3.0],
  // Aseo
  [6.38, H-.05, 7.20, 0xe8f0ff, 0.8, 2.0],
  // Dorm2
  [1.80, H-.05, 8.75, 0xfff0d0, 0.7, 3.5],
  // Terraza
  [2.48, H-.05,-1.00, 0xfffdf0, 0.5, 4.0],
];

roomLights.forEach(([x,y,z,col,intensity,dist]) => {
  const lt = new THREE.PointLight(col, intensity, dist, 2);
  lt.position.set(x,y,z); lt.castShadow=false; scene.add(lt);
  cylMesh(x, H-.01, z, 0.07,0.05,0.04,8, new THREE.MeshStandardMaterial({color:0xcccccc,roughness:0.5,emissive:0xfff0c0,emissiveIntensity:intensity*.8}));
});

// Kitchen pendant lights
[6.00,7.00].forEach(xi => {
  const kl=new THREE.PointLight(0xfff0c0,0.8,2.0,2); kl.position.set(xi,H-.3,0.60); scene.add(kl);
});

// Bedside lamp lights
[[0.825,0.9,7.35],[3.025,0.9,7.35]].forEach(([x,y,z])=>{
  const bl=new THREE.PointLight(0xffdf90,0.6,2.0,2); bl.position.set(x,y,z); scene.add(bl);
});

// ═══════════════════════════════════════════════════════════
//  NAVIGATION — PLAYER / CONTROLS
// ═══════════════════════════════════════════════════════════
let controls = null, playerObj;

if (!isMobile) {
  controls = new PointerLockControls(camera, renderer.domElement);
  scene.add(controls.getObject());
  // Start: inside Recibidor, facing west (into apartment)
  controls.getObject().position.set(8.20, 1.65, 3.50);
  camera.rotation.y = Math.PI; // face west
  playerObj = controls.getObject();
} else {
  camera.position.set(8.20, 1.65, 3.50);
  camera.rotation.order = 'YXZ';
  camera.rotation.y = Math.PI;
  playerObj = camera;
}

const keys = {};
window.addEventListener('keydown', e => { keys[e.code]=true; });
window.addEventListener('keyup',   e => { keys[e.code]=false; });

const velocity  = new THREE.Vector3();
const direction = new THREE.Vector3();
const moveSpeed = 4.0, accel = 10.0, decel = 14.0;
let clock = new THREE.Clock(), bobTime = 0;

// ═══════════════════════════════════════════════════════════
//  MOBILE STATE & TOUCH CONTROLS
// ═══════════════════════════════════════════════════════════
let mobileActive = false, autoWalk = false, lastRightTap = 0;
const JOYSTICK_RADIUS = 60, LOOK_SENS = 0.0028, PITCH_LIMIT = Math.PI*.42;
const joyTouch  = { id:null, baseX:0, baseY:0, dx:0, dy:0 };
const lookTouch = { id:null, lastX:0, lastY:0 };

if (isMobile) {
  const jzEl=document.getElementById('joystick-zone'),jbEl=document.getElementById('joystick-base');
  const jkEl=document.getElementById('joystick-knob'),lzEl=document.getElementById('look-zone');
  const awBadge=document.getElementById('autowalk-badge'),orientPr=document.getElementById('orient-prompt');
  jzEl.style.display='block'; lzEl.style.display='block';
  document.getElementById('hint').innerHTML='Joystick: Mover &nbsp;|&nbsp; Arrastrar: Mirar';
  document.getElementById('ld-btn').textContent='Visita Virtual · Toca para comenzar';

  jzEl.addEventListener('touchstart',e=>{e.preventDefault();for(const t of e.changedTouches){if(joyTouch.id===null){joyTouch.id=t.identifier;joyTouch.baseX=t.clientX;joyTouch.baseY=t.clientY;joyTouch.dx=0;joyTouch.dy=0;jbEl.style.left=(t.clientX-60)+'px';jbEl.style.top=(t.clientY-60)+'px';jbEl.style.display='flex';jkEl.style.transform='';}}},{passive:false});
  jzEl.addEventListener('touchmove',e=>{e.preventDefault();for(const t of e.changedTouches){if(t.identifier===joyTouch.id){let dx=t.clientX-joyTouch.baseX,dy=t.clientY-joyTouch.baseY;const dist=Math.sqrt(dx*dx+dy*dy);if(dist>JOYSTICK_RADIUS){dx=dx/dist*JOYSTICK_RADIUS;dy=dy/dist*JOYSTICK_RADIUS;}joyTouch.dx=dx;joyTouch.dy=dy;jkEl.style.transform=`translate(${dx}px,${dy}px)`;}}},{passive:false});
  const joyEnd=e=>{e.preventDefault();for(const t of e.changedTouches){if(t.identifier===joyTouch.id){joyTouch.id=null;joyTouch.dx=0;joyTouch.dy=0;jkEl.style.transform='';jbEl.style.display='none';}}};
  jzEl.addEventListener('touchend',joyEnd,{passive:false}); jzEl.addEventListener('touchcancel',joyEnd,{passive:false});

  lzEl.addEventListener('touchstart',e=>{e.preventDefault();for(const t of e.changedTouches){if(lookTouch.id===null){lookTouch.id=t.identifier;lookTouch.lastX=t.clientX;lookTouch.lastY=t.clientY;}const now=Date.now();if(now-lastRightTap<350){autoWalk=!autoWalk;awBadge.classList.toggle('on',autoWalk);}lastRightTap=now;}},{passive:false});
  lzEl.addEventListener('touchmove',e=>{e.preventDefault();for(const t of e.changedTouches){if(t.identifier===lookTouch.id){const ddx=t.clientX-lookTouch.lastX,ddy=t.clientY-lookTouch.lastY;lookTouch.lastX=t.clientX;lookTouch.lastY=t.clientY;camera.rotation.y-=ddx*LOOK_SENS;camera.rotation.x-=ddy*LOOK_SENS;camera.rotation.x=Math.max(-PITCH_LIMIT,Math.min(PITCH_LIMIT,camera.rotation.x));}}},{passive:false});
  const lookEnd=e=>{e.preventDefault();for(const t of e.changedTouches){if(t.identifier===lookTouch.id)lookTouch.id=null;}};
  lzEl.addEventListener('touchend',lookEnd,{passive:false}); lzEl.addEventListener('touchcancel',lookEnd,{passive:false});

  function checkOrientation(){const isP=window.innerHeight>window.innerWidth;orientPr.classList.toggle('show',isP);}
  checkOrientation(); window.addEventListener('resize',checkOrientation);
  if(screen.orientation&&screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{});
}

// ═══════════════════════════════════════════════════════════
//  COLLISION DETECTION
// ═══════════════════════════════════════════════════════════
// Overall apartment bounding box (permissive — actual walls handle blocking)
const OUTER_BOUNDS = { minX:0.32, maxX:8.68, minZ:-1.85, maxZ:9.78 };

function resolveCollisions(pos) {
  // Clamp to outer apartment boundary
  pos.x = Math.max(OUTER_BOUNDS.minX, Math.min(OUTER_BOUNDS.maxX, pos.x));
  pos.z = Math.max(OUTER_BOUNDS.minZ, Math.min(OUTER_BOUNDS.maxZ, pos.z));
  // Test against furniture collidables
  for (const b of collidables) {
    const inX = pos.x > b.minX && pos.x < b.maxX;
    const inZ = pos.z > b.minZ && pos.z < b.maxZ;
    if (inX && inZ) {
      const oPX=b.maxX-pos.x, oNX=pos.x-b.minX, oPZ=b.maxZ-pos.z, oNZ=pos.z-b.minZ;
      const m=Math.min(oPX,oNX,oPZ,oNZ);
      if      (m===oPX) pos.x=b.maxX;
      else if (m===oNX) pos.x=b.minX;
      else if (m===oPZ) pos.z=b.maxZ;
      else              pos.z=b.minZ;
    }
  }
}

// ═══════════════════════════════════════════════════════════
//  ROOM DETECTION
// ═══════════════════════════════════════════════════════════
function getCurrentRoom(x, z) {
  for (const [key, r] of Object.entries(ROOM_DEFS)) {
    if (x >= r.x0 && x <= r.x1 && z >= r.z0 && z <= r.z1) return key;
  }
  return null;
}

// ═══════════════════════════════════════════════════════════
//  MINIMAP — CAD-accurate layout
// ═══════════════════════════════════════════════════════════
const mmCanvas = document.getElementById('mm-canvas');
const mmCtx    = mmCanvas.getContext('2d');
const mmW = 180, mmH = 200;

// World bounds: x=[0,9.0], z=[-2,10.1] → 9.0m × 12.1m
const MM_WX = 9.0, MM_WZ = 12.1, MM_OZ = 2.0; // z offset (terrace starts at -2)
const mmScale = Math.min(mmW / MM_WX, mmH / MM_WZ) * 0.88;
const mmOffX  = (mmW - MM_WX * mmScale) * 0.5;
const mmOffY  = (mmH - MM_WZ * mmScale) * 0.5;

function worldToMM(wx, wz) {
  return [mmOffX + wx * mmScale, mmH - (mmOffY + (wz + MM_OZ) * mmScale)];
}

// Room polygons for minimap (same as ROOM_DEFS)
const MM_ROOMS = [
  { x0:0.15,x1:4.80,z0:-2.0,z1:0.0,  col:'rgba(140,200,150,0.35)', label:'Terraza' },
  { x0:0.30,x1:5.30,z0:0.30,z1:4.30, col:'rgba(212,165,116,0.40)', label:'Salón'   },
  { x0:5.50,x1:8.55,z0:0.30,z1:2.30, col:'rgba(230,180,100,0.40)', label:'Cocina'  },
  { x0:5.50,x1:8.70,z0:2.50,z1:4.50, col:'rgba(212,165,116,0.35)', label:'Recib.'  },
  { x0:3.85,x1:5.50,z0:4.50,z1:5.50, col:'rgba(200,190,160,0.35)', label:'Paso'    },
  { x0:5.50,x1:8.00,z0:4.50,z1:6.20, col:'rgba(140,160,160,0.45)', label:'Baño'    },
  { x0:0.30,x1:3.85,z0:4.50,z1:7.50, col:'rgba(212,165,116,0.40)', label:'Dorm.1'  },
  { x0:5.50,x1:7.25,z0:6.40,z1:8.00, col:'rgba(140,160,160,0.40)', label:'Aseo'    },
  { x0:0.30,x1:3.30,z0:7.70,z1:9.80, col:'rgba(212,165,116,0.38)', label:'Dorm.2'  },
];

function drawMinimap(px, pz, playerAngle) {
  mmCtx.clearRect(0,0,mmW,mmH);

  // Building silhouette background
  mmCtx.fillStyle='rgba(5,10,20,0.65)';
  mmCtx.fillRect(0,0,mmW,mmH);

  // Rooms
  MM_ROOMS.forEach(r => {
    const [x0,y0]=worldToMM(r.x0,r.z0);
    const [x1,y1]=worldToMM(r.x1,r.z1);
    const rx=Math.min(x0,x1),ry=Math.min(y0,y1),rw=Math.abs(x1-x0),rh=Math.abs(y1-y0);
    mmCtx.fillStyle=r.col; mmCtx.fillRect(rx,ry,rw,rh);
    mmCtx.strokeStyle='rgba(255,255,255,0.40)'; mmCtx.lineWidth=0.8;
    mmCtx.strokeRect(rx,ry,rw,rh);
    // Label
    if (rw > 18 && rh > 10) {
      mmCtx.fillStyle='rgba(255,255,255,0.35)'; mmCtx.font='5px Helvetica Neue';
      mmCtx.textAlign='center'; mmCtx.textBaseline='middle';
      mmCtx.fillText(r.label, rx+rw*.5, ry+rh*.5);
    }
  });

  // Door markers (small breaks in walls — visual only)
  mmCtx.strokeStyle='rgba(0,0,0,0)';

  // Player
  const [mx,my]=worldToMM(px,pz);
  mmCtx.save();
  mmCtx.translate(mx,my);
  mmCtx.rotate(-playerAngle);
  // FOV cone
  mmCtx.beginPath(); mmCtx.moveTo(0,0);
  mmCtx.arc(0,0,14,-Math.PI/3,Math.PI/3); mmCtx.closePath();
  mmCtx.fillStyle='rgba(196,165,90,0.22)'; mmCtx.fill();
  // Player dot
  mmCtx.beginPath(); mmCtx.arc(0,0,3.5,0,Math.PI*2);
  mmCtx.fillStyle='#c4a55a'; mmCtx.fill();
  mmCtx.strokeStyle='#fff'; mmCtx.lineWidth=1; mmCtx.stroke();
  mmCtx.restore();

  // Scale indicator
  mmCtx.fillStyle='rgba(255,255,255,0.25)'; mmCtx.font='7px Helvetica Neue'; mmCtx.textAlign='left'; mmCtx.textBaseline='top';
  mmCtx.fillText('N↑', 4, 4);
}

// ═══════════════════════════════════════════════════════════
//  UI STATE
// ═══════════════════════════════════════════════════════════
let currentRoom='', roomLabelTimeout=null;
const roomLabel  = document.getElementById('room-label');
const xhair      = document.getElementById('xhair');
const hintEl     = document.getElementById('hint');
const pauseEl    = document.getElementById('pause');
const minimapEl  = document.getElementById('minimap');

function showRoomLabel(name) {
  if (name===currentRoom) return;
  currentRoom=name;
  if (!name){roomLabel.classList.remove('show');return;}
  roomLabel.textContent=name;
  roomLabel.classList.add('show');
  if (roomLabelTimeout) clearTimeout(roomLabelTimeout);
  roomLabelTimeout=setTimeout(()=>roomLabel.classList.remove('show'),2800);
}

// ═══════════════════════════════════════════════════════════
//  ANIMATION LOOP
// ═══════════════════════════════════════════════════════════
let paused = false;

function animate() {
  requestAnimationFrame(animate);
  if (paused) return;
  const dt  = Math.min(clock.getDelta(), 0.05);
  const pos = playerObj.position;
  const isActive = isMobile ? mobileActive : (controls && controls.isLocked);

  if (isActive) {
    direction.set(0,0,0);
    if (isMobile) {
      direction.x = joyTouch.dx / JOYSTICK_RADIUS;
      direction.z = joyTouch.dy / JOYSTICK_RADIUS;
      if (autoWalk) direction.z = -1;
      if (direction.lengthSq()>1) direction.normalize();
    } else {
      if (keys['KeyW']||keys['ArrowUp'])    direction.z -= 1;
      if (keys['KeyS']||keys['ArrowDown'])  direction.z += 1;
      if (keys['KeyA']||keys['ArrowLeft'])  direction.x -= 1;
      if (keys['KeyD']||keys['ArrowRight']) direction.x += 1;
      if (direction.lengthSq()>0) direction.normalize();
    }

    const euler=new THREE.Euler(0,0,0,'YXZ');
    euler.setFromQuaternion(camera.quaternion);
    const yaw=euler.y, sinY=Math.sin(yaw), cosY=Math.cos(yaw);
    const worldX=direction.x*cosY+direction.z*sinY;
    const worldZ=direction.x*(-sinY)+direction.z*cosY;

    const moving=direction.lengthSq()>0;
    if (moving) {
      velocity.x+=(worldX*moveSpeed-velocity.x)*Math.min(accel*dt,1);
      velocity.z+=(worldZ*moveSpeed-velocity.z)*Math.min(accel*dt,1);
    } else {
      velocity.x*=Math.max(0,1-decel*dt);
      velocity.z*=Math.max(0,1-decel*dt);
    }

    pos.x+=velocity.x*dt; resolveCollisions(pos);
    pos.z+=velocity.z*dt; resolveCollisions(pos);

    if (!isMobile) {
      const speed=Math.sqrt(velocity.x**2+velocity.z**2);
      if (speed>0.3) { bobTime+=dt*2.4; pos.y=1.65+Math.sin(bobTime*Math.PI)*0.022; }
      else           { bobTime=0; pos.y+=(1.65-pos.y)*Math.min(10*dt,1); }
    }

    const room=getCurrentRoom(pos.x,pos.z);
    if (room&&ROOM_DEFS[room]) showRoomLabel(ROOM_DEFS[room].name);

    euler.setFromQuaternion(camera.quaternion);
    drawMinimap(pos.x, pos.z, euler.y);
  }

  renderer.render(scene,camera);
}

// ═══════════════════════════════════════════════════════════
//  POINTER LOCK + UI EVENTS (desktop)
// ═══════════════════════════════════════════════════════════
if (!isMobile && controls) {
  controls.addEventListener('lock', () => {
    pauseEl.classList.remove('active'); xhair.classList.add('on');
    hintEl.classList.add('on'); minimapEl.classList.add('on'); paused=false;
  });
  controls.addEventListener('unlock', () => {
    xhair.classList.remove('on'); hintEl.classList.remove('on');
    pauseEl.classList.add('active'); paused=false;
  });
  document.getElementById('pause').addEventListener('click', ()=>{ if(!controls.isLocked) controls.lock(); });
}

// Loading sequence
let loadProgress=0;
const ldBar=document.getElementById('ld-bar'), ldBtn=document.getElementById('ld-btn');
const ldStatus=document.getElementById('ld-status'), ldEl=document.getElementById('loading');
function setProgress(p){loadProgress=Math.max(loadProgress,p);ldBar.style.width=loadProgress+'%';}
setProgress(20);
setTimeout(()=>{setProgress(50);ldStatus.textContent='Generando texturas…';},200);
setTimeout(()=>{setProgress(80);ldStatus.textContent='Construyendo planta tipo…';},500);
setTimeout(()=>{setProgress(100);ldStatus.textContent='Listo · 67m² CAD';ldBtn.style.display='inline-block';ldStatus.style.opacity='0';},900);

function beginTour() {
  if (ldEl.classList.contains('fade-out')) return;
  ldEl.classList.add('fade-out');
  setTimeout(()=>{ldEl.classList.add('gone');},1300);
  if (isMobile){mobileActive=true;minimapEl.classList.add('on');hintEl.classList.add('on');}
  else controls.lock();
}
ldBtn.addEventListener('click', beginTour);
ldBtn.addEventListener('touchend', e=>{e.preventDefault();beginTour();});

window.addEventListener('resize', ()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

clock.start();
animate();
</script>
