<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SantGenís3 — Visita Virtual | Los Miradores · Agudells Homes</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; user-select: none; }
    #c { display: block; position: fixed; inset: 0; width: 100% !important; height: 100% !important; }

    /* ── LOADING SCREEN ── */
    #loading {
      position: fixed; inset: 0; z-index: 1000;
      background: linear-gradient(135deg, #0c1220 0%, #1a2035 50%, #0d1a30 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 1.2s cubic-bezier(.4,0,.2,1);
    }
    #loading.fade-out { opacity: 0; pointer-events: none; }
    #loading.gone { display: none; }

    .ld-brand {
      font-size: 11px; letter-spacing: 5px; text-transform: uppercase;
      color: #c4a55a; margin-bottom: 32px; opacity: .7;
    }
    .ld-title {
      font-size: 56px; font-weight: 200; letter-spacing: 3px; color: #fff;
      margin-bottom: 6px; line-height: 1;
    }
    .ld-title span { color: #c4a55a; font-weight: 400; }
    .ld-sub {
      font-size: 17px; color: rgba(180,200,230,.7); letter-spacing: 2px;
      margin-bottom: 52px; font-weight: 300;
    }
    .ld-bar-wrap {
      width: 280px; height: 1px; background: rgba(255,255,255,.12);
      margin-bottom: 48px; position: relative; overflow: visible;
    }
    #ld-bar {
      height: 100%; background: linear-gradient(90deg, #c4a55a, #e8d090);
      width: 0%; transition: width .4s ease; position: relative;
    }
    #ld-bar::after {
      content: ''; position: absolute; right: -1px; top: -3px;
      width: 3px; height: 7px; background: #e8d090;
    }
    #ld-btn {

      background: rgba(196,165,90,.1); border: 1px solid rgba(196,165,90,.4);

    #xhair {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 18px; height: 18px; pointer-events: none; z-index: 200;
      display: none;

    #xhair::before, #xhair::after {
      content: ''; position: absolute; background: rgba(255,255,255,.75);
    }
    #xhair::before { width: 100%; height: 1px; top: 50%; transform: translateY(-50%); }
    #xhair::after  { width: 1px; height: 100%; left: 50%; transform: translateX(-50%); }
    #xhair.on { display: block; }

    /* ── ROOM LABEL ── */
    #room-label {
      position: fixed; top: 36px; left: 50%; transform: translateX(-50%);

      #ld-btn   { padding: 12px 36px; font-size: 10px; letter-spacing: 3px; }
      #room-label { font-size: 9px; letter-spacing: 2.5px; padding: 6px 16px; top: 18px; }
      #brand { top: 12px; left: 12px; }

      #mm-canvas { width: 120px; height: 136px; }
    }
  </style>

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

// ═══════════════════════════════════════════════════════════
//  DEVICE DETECTION
// ═══════════════════════════════════════════════════════════
const isMobile = ('ontouchstart' in window || navigator.maxTouchPoints > 0) &&
                 window.innerWidth <= 1024;

// ═══════════════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════════════
const H  = 2.70;   // wall height (m)
const T  = 0.12;   // wall thickness
const DW = 0.85;   // door width
const DH = 2.10;   // door height
const PR = 0.28;   // player radius

// ── Apartment floor plan (X, Z in metres; Y = up) ──
// Layout top-down:
//   South facade (z=0): full-width sliding glass to terrace
//   North facade (z=11): bedroom windows
//
//   z=0–5   : LDK (open plan)                      x=0–6
//   z=5–7.5 : Hallway/Entry (x=0–4) | Bathroom (x=4–6)
//   z=7.5–11: Master Bed (x=0–3)  | Second Bed (x=3–6)
//   z=-2–0  : Terrace
//

const ROOM_DEFS = {
  ldk:      { x0:0, x1:6,   z0:0,    z1:5,    name:'Salón · Cocina',         col:'#d4a574' },
  hallway:  { x0:0, x1:4,   z0:5,    z1:7.5,  name:'Entrada · Distribuidor', col:'#d4a574' },
  bathroom: { x0:4, x1:6,   z0:5,    z1:7.5,  name:'Baño',                   col:'#8a8a8a' },
  bed1:     { x0:0, x1:3,   z0:7.5,  z1:11,   name:'Dormitorio Principal',    col:'#d4a574' },
  bed2:     { x0:3, x1:6,   z0:7.5,  z1:11,   name:'Dormitorio 2',           col:'#d4a574' },
  terrace:  { x0:0, x1:6,   z0:-2,   z1:0,    name:'Terraza · Vistas',       col:'#7a7a7a' },
};

// ═══════════════════════════════════════════════════════════
//  RENDERER / SCENE / CAMERA
// ═══════════════════════════════════════════════════════════
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, isMobile ? 1.5 : 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
renderer.setAnimationLoop(null); // we drive the loop manually
renderer.domElement.id = 'c';
document.body.insertBefore(renderer.domElement, document.body.firstChild);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.05, 200);

// ═══════════════════════════════════════════════════════════
//  PROCEDURAL TEXTURES
// ═══════════════════════════════════════════════════════════

function makeWoodGrainTexture(sz = 512) {
  const c = document.createElement('canvas');
  c.width = c.height = sz;
  const ctx = c.getContext('2d');

  // Base honey-oak colour
  const bg = ctx.createLinearGradient(0, 0, sz, sz);
  bg.addColorStop(0,   '#ddb070');
  bg.addColorStop(0.3, '#d4a574');
  bg.addColorStop(0.7, '#c89660');
  bg.addColorStop(1,   '#d8aa78');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, sz, sz);

  // Long grain lines running along X
  const rng = mulberry32(42);
  for (let i = 0; i < 320; i++) {
    const y0     = rng() * sz;
    const wave   = (rng() - 0.5) * 18;
    const freq   = 0.008 + rng() * 0.012;
    const lw     = 0.4 + rng() * 1.8;
    const alpha  = 0.04 + rng() * 0.14;
    const dark   = rng() > 0.55;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(0, y0);
    for (let x = 0; x <= sz; x += 4) {
      ctx.lineTo(x, y0 + Math.sin(x * freq) * wave + Math.sin(x * freq * 3.1) * (wave * 0.3));
    }
    ctx.strokeStyle = dark ? `rgba(90,50,15,${alpha})` : `rgba(240,190,110,${alpha})`;
    ctx.lineWidth = lw;
    ctx.stroke();
    ctx.restore();
  }

  // Short ray-like cross-grain marks
  for (let i = 0; i < 60; i++) {
    const cx  = rng() * sz;
    const cy  = rng() * sz;
    const len = 4 + rng() * 20;
    ctx.save();
    ctx.globalAlpha = 0.04 + rng() * 0.10;
    ctx.strokeStyle = `rgba(80,40,10,1)`;
    ctx.lineWidth   = 0.5 + rng() * 1.5;
    ctx.beginPath();
    ctx.moveTo(cx - len * 0.3, cy);
    ctx.lineTo(cx + len, cy + (rng() - 0.5) * 4);
    ctx.stroke();
    ctx.restore();
  }

  // Subtle knots
  for (let i = 0; i < 2; i++) {
    const kx = rng() * sz;
    const ky = rng() * sz;
    const gr = ctx.createRadialGradient(kx, ky, 0, kx, ky, 25 + rng() * 20);
    gr.addColorStop(0,   `rgba(70,35,10,0.35)`);
    gr.addColorStop(0.5, `rgba(90,50,20,0.15)`);
    gr.addColorStop(1,   `rgba(90,50,20,0)`);
    ctx.fillStyle = gr;
    ctx.fillRect(0, 0, sz, sz);
  }

  // Slight varnish sheen
  const sheen = ctx.createLinearGradient(0, 0, sz * 0.6, sz * 0.6);
  sheen.addColorStop(0,   'rgba(255,255,255,0.06)');
  sheen.addColorStop(0.5, 'rgba(255,255,255,0.02)');
  sheen.addColorStop(1,   'rgba(0,0,0,0.04)');
  ctx.fillStyle = sheen;
  ctx.fillRect(0, 0, sz, sz);

  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

function makeTileTexture(sz = 512, tileCount = 4, tileCol = '#8a8a8a', groutCol = '#6a6a6a') {
  const c = document.createElement('canvas');
  c.width = c.height = sz;
  const ctx = c.getContext('2d');
  const tileSize = sz / tileCount;
  const grout = 3;

  ctx.fillStyle = groutCol;
  ctx.fillRect(0, 0, sz, sz);

  const rng = mulberry32(17);
  for (let row = 0; row < tileCount; row++) {
    for (let col = 0; col < tileCount; col++) {
      const tx = col * tileSize + grout;
      const ty = row * tileSize + grout;
      const tw = tileSize - grout * 2;
      const th = tileSize - grout * 2;
      const v  = (rng() - 0.5) * 18;
      const r0 = parseInt(tileCol.slice(1, 3), 16);
      const g0 = parseInt(tileCol.slice(3, 5), 16);
      const b0 = parseInt(tileCol.slice(5, 7), 16);
      const r = Math.max(0, Math.min(255, r0 + v)) | 0;
      const g = Math.max(0, Math.min(255, g0 + v)) | 0;
      const b = Math.max(0, Math.min(255, b0 + v)) | 0;
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.fillRect(tx, ty, tw, th);

      // subtle directional highlight
      const hl = ctx.createLinearGradient(tx, ty, tx + tw, ty + th);
      hl.addColorStop(0, 'rgba(255,255,255,0.07)');
      hl.addColorStop(1, 'rgba(0,0,0,0.06)');
      ctx.fillStyle = hl;
      ctx.fillRect(tx, ty, tw, th);
    }
  }

  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

function makeOutdoorTileTexture(sz = 512) {
  // Larger format outdoor tiles with slight texture
  const c = document.createElement('canvas');
  c.width = c.height = sz;
  const ctx = c.getContext('2d');
  const rng = mulberry32(31);

  ctx.fillStyle = '#666';
  ctx.fillRect(0, 0, sz, sz);

  // 2×3 large tiles
  const cols = 2, rows = 3;
  const tw = sz / cols, th = sz / rows;
  const grout = 4;
  for (let r = 0; r < rows; r++) {
    for (let cl = 0; cl < cols; cl++) {
      const x = cl * tw + grout, y = r * th + grout;
      const w = tw - grout * 2,  h = th - grout * 2;
      const v = (rng() - 0.5) * 20;
      const base = 0x7a + v;
      const b = Math.max(0, Math.min(255, base)) | 0;
      ctx.fillStyle = `rgb(${b},${b},${b})`;
      ctx.fillRect(x, y, w, h);
      const hl = ctx.createLinearGradient(x, y, x + w, y + h);
      hl.addColorStop(0, 'rgba(255,255,255,0.06)');
      hl.addColorStop(1, 'rgba(0,0,0,0.07)');
      ctx.fillStyle = hl;
      ctx.fillRect(x, y, w, h);
      // subtle surface noise
      for (let n = 0; n < 40; n++) {
        const nx = x + rng() * w, ny = y + rng() * h;
        const nv = (rng() - 0.5) * 0.1;
        ctx.fillStyle = `rgba(${nv>0?255:0},${nv>0?255:0},${nv>0?255:0},${Math.abs(nv)})`;
        ctx.fillRect(nx, ny, 2, 2);
      }
    }
  }

  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

function makeSkyTexture(sz = 512) {
  const c = document.createElement('canvas');
  c.width = sz; c.height = sz;
  const ctx = c.getContext('2d');
  const g = ctx.createLinearGradient(0, 0, 0, sz);
  g.addColorStop(0,    '#1a4f8f');
  g.addColorStop(0.35, '#3a7bc8');
  g.addColorStop(0.65, '#87ceeb');
  g.addColorStop(0.85, '#c8e8f8');
  g.addColorStop(1,    '#ddf2ff');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, sz, sz);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

function makeGlassTex(sz = 64) {
  const c = document.createElement('canvas');
  c.width = c.height = sz;
  const ctx = c.getContext('2d');
  ctx.fillStyle = 'rgba(200,230,255,0.15)';
  ctx.fillRect(0, 0, sz, sz);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

// Fast seeded PRNG (Mulberry32)
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ═══════════════════════════════════════════════════════════
//  TEXTURES & MATERIALS
// ═══════════════════════════════════════════════════════════
const woodTex        = makeWoodGrainTexture(512);
const tileTex        = makeTileTexture(512, 4, '#8a8a8a', '#6a6a6a');
const outdoorTileTex = makeOutdoorTileTexture(512);
const glassTex       = makeGlassTex(64);

woodTex.repeat.set(5, 5);
tileTex.repeat.set(3, 3);
outdoorTileTex.repeat.set(4, 3);

const MAT = {
  wall:    new THREE.MeshStandardMaterial({ color: 0xf5f5f0, roughness: 0.88, metalness: 0.0 }),
  ceil:    new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.95 }),
  floorW:  new THREE.MeshStandardMaterial({ map: woodTex, roughness: 0.65, metalness: 0.05 }),
  floorT:  new THREE.MeshStandardMaterial({ map: tileTex, roughness: 0.45, metalness: 0.15 }),
  floorOT: new THREE.MeshStandardMaterial({ map: outdoorTileTex, roughness: 0.60, metalness: 0.05 }),
  glass:   new THREE.MeshPhysicalMaterial({ map: glassTex, color: 0xd0eeff, transparent: true, opacity: 0.22, roughness: 0.05, metalness: 0.0, transmission: 0.8, side: THREE.DoubleSide }),
  glassR:  new THREE.MeshPhysicalMaterial({ color: 0xd0eeff, transparent: true, opacity: 0.12, roughness: 0.02, metalness: 0.1, side: THREE.DoubleSide }),
  winFrame:new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.4, metalness: 0.3 }),
  doorMat: new THREE.MeshStandardMaterial({ color: 0xf0ede5, roughness: 0.75 }),
  doorFrm: new THREE.MeshStandardMaterial({ color: 0xd8d5ce, roughness: 0.7 }),
  kitcBase:new THREE.MeshStandardMaterial({ color: 0xf5f5f5, roughness: 0.8 }),
  kitcCTop:new THREE.MeshStandardMaterial({ color: 0x4a4a4a, roughness: 0.45, metalness: 0.2 }),
  kitcHndl:new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.3, metalness: 0.6 }),

//  GEOMETRY HELPERS

const collidables = [];  // [{minX,maxX,minZ,maxZ}]

function box(x, y, z, w, h, d, mat, opts = {}) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  m.position.set(x, y, z);
  if (opts.ry) m.rotation.y = opts.ry;
  m.castShadow    = opts.castShadow    !== false;
  m.receiveShadow = opts.receiveShadow !== false;
  scene.add(m);
  if (opts.collide) collidables.push({ minX: x - w * 0.5 - PR, maxX: x + w * 0.5 + PR, minZ: z - d * 0.5 - PR, maxZ: z + d * 0.5 + PR });
  return m;
}

function cylMesh(x, y, z, rt, rb, h, seg, mat, opts = {}) {
  const m = new THREE.Mesh(new THREE.CylinderGeometry(rt, rb, h, seg), mat);
  m.position.set(x, y, z);
  if (opts.ry) m.rotation.y = opts.ry;
  if (opts.rx) m.rotation.x = opts.rx;
  m.castShadow = m.receiveShadow = true;
  scene.add(m);
  return m;
}

// Build a floor plane
function floor(x, z, w, d, mat, yOffset = 0) {
  const m = new THREE.Mesh(new THREE.PlaneGeometry(w, d), mat);
  m.rotation.x = -Math.PI / 2;
  m.position.set(x, yOffset, z);
  m.receiveShadow = true;
  m.castShadow = false;
  scene.add(m);
  return m;
}

// Build a ceiling plane
function ceiling(x, z, w, d, mat) {
  const m = new THREE.Mesh(new THREE.PlaneGeometry(w, d), mat);
  m.rotation.x = Math.PI / 2;
  m.position.set(x, H, z);
  m.receiveShadow = true;
  scene.add(m);
  return m;
}

// ── Wall building with optional door/window openings ──
// dir: 'x' = wall runs along X (constant Z), 'z' = wall runs along Z (constant X)
function wallSolid(dir, fixed, start, end, y0, y1, mat, thick = T) {
  if (end <= start || y1 <= y0) return;
  const len = end - start, h = y1 - y0;
  const cx = dir === 'x' ? (start + end) * 0.5 : fixed;
  const cz = dir === 'x' ? fixed : (start + end) * 0.5;
  const w  = dir === 'x' ? len   : thick;
  const d  = dir === 'x' ? thick : len;
  box(cx, y0 + h * 0.5, cz, w, h, d, mat, { collide: true, castShadow: true });
}

function wallWithDoor(dir, fixed, start, end, doorStart, doorEnd, mat, thick = T) {
  // left of door
  wallSolid(dir, fixed, start, doorStart, 0, H, mat, thick);
  // above door
  wallSolid(dir, fixed, doorStart, doorEnd, DH, H, mat, thick);
  // right of door
  wallSolid(dir, fixed, doorEnd, end, 0, H, mat, thick);
}

function wallWithWindow(dir, fixed, start, end, winStart, winEnd, winBot, winTop, mat, thick = T) {
  // below window
  wallSolid(dir, fixed, start, end, 0, winBot, mat, thick);
  // above window
  wallSolid(dir, fixed, start, end, winTop, H, mat, thick);
  // left of window
  wallSolid(dir, fixed, winStart, winStart, winBot, winTop, mat, thick);
  // right of window
  wallSolid(dir, fixed, winEnd, end, winBot, winTop, mat, thick);
  // window glass fill
  const len = winEnd - winStart;
  const hh  = winTop - winBot;
  const cx = dir === 'x' ? (winStart + winEnd) * 0.5 : fixed;
  const cz = dir === 'x' ? fixed : (winStart + winEnd) * 0.5;
  const w  = dir === 'x' ? len   : 0.04;
  const d  = dir === 'x' ? 0.04  : len;
  box(cx, winBot + hh * 0.5, cz, w, hh, d, MAT.glass, { castShadow: false });
  // frame
  const fw = 0.06;
  // sides
  const fx0 = dir === 'x' ? winStart - fw * 0.5 : fixed;
  const fz0 = dir === 'x' ? fixed : winStart - fw * 0.5;
  const fw0 = dir === 'x' ? fw : fw;
  box(fx0, winBot + hh * 0.5, dir === 'x' ? fixed : winStart - fw*0.5, dir === 'x' ? fw : fw, hh, dir === 'x' ? fw : fw, MAT.winFrame, { castShadow: false, collide: false });
}

// Generic window with full glass (no sill cutout — glass floats in opening)
function windowPane(cx, y, cz, w, h, d) {
  // glass pane
  box(cx, y, cz, w, h, d, MAT.glass, { castShadow: false, collide: false });
}

// Door frame helper (adds a thin frame around door opening)
function doorFrame(dir, fixed, doorCenter, y0 = 0) {
  const fw = 0.06, fd = 0.08;
  const dc = doorCenter;
  // jambs
  if (dir === 'x') {
    box(dc - DW * 0.5, y0 + DH * 0.5, fixed, fw, DH, fd, MAT.doorFrm, { collide: false, castShadow: false });
    box(dc + DW * 0.5, y0 + DH * 0.5, fixed, fw, DH, fd, MAT.doorFrm, { collide: false, castShadow: false });
    box(dc, y0 + DH + fw * 0.5, fixed, DW + fw * 2, fw, fd, MAT.doorFrm, { collide: false, castShadow: false });
  } else {
    box(fixed, y0 + DH * 0.5, dc - DW * 0.5, fd, DH, fw, MAT.doorFrm, { collide: false, castShadow: false });
    box(fixed, y0 + DH * 0.5, dc + DW * 0.5, fd, DH, fw, MAT.doorFrm, { collide: false, castShadow: false });
    box(fixed, y0 + DH + fw * 0.5, dc, fd, fw, DW + fw * 2, MAT.doorFrm, { collide: false, castShadow: false });
  }
}

sunLight.shadow.mapSize.set(isMobile ? 1024 : 2048, isMobile ? 1024 : 2048);
sunLight.shadow.camera.near = 0.5;
sunLight.shadow.camera.far  = 60;
sunLight.shadow.camera.left   = -12;
sunLight.shadow.camera.right  = 12;
sunLight.shadow.camera.top    = 12;
sunLight.shadow.camera.bottom = -4;
sunLight.shadow.bias = -0.001;
sunLight.shadow.normalBias = 0.05;

scene.add(sunLight.target);

// Secondary fill from north (cool, soft)

fillLight.castShadow = false;
scene.add(fillLight);

// Room ceiling point lights (recessed, warm)
const roomLights = [
  // LDK
  [1.5, H - 0.05, 1.5, 0xfff0d0, 1.0, 4.5],
  [4.5, H - 0.05, 2.5, 0xfff0d0, 0.8, 4.0],
  [3.0, H - 0.05, 4.0, 0xfff0d0, 0.8, 3.5],
  // Hallway
  [1.5, H - 0.05, 6.2, 0xfff0d0, 0.7, 3.0],
  // Bathroom (cooler)
  [5.0, H - 0.05, 6.5, 0xe8f0ff, 1.0, 2.5],
  // Master bed
  [1.5, H - 0.05, 9.5, 0xfff0d0, 0.8, 3.5],
  // Second bed
  [4.5, H - 0.05, 9.5, 0xfff0d0, 0.7, 3.0],

roomLights.forEach(([x, y, z, col, intensity, dist]) => {

});

// Kitchen pendant lights (point lights below pendants)
[1.0, 2.0].forEach(zi => {
  const kl = new THREE.PointLight(0xfff0c0, 0.8, 2.0, 2);

// Bedside lamp lights
const bedsideLights = [[0.4, 0.9, 10.55], [2.6, 0.9, 10.55]];
bedsideLights.forEach(([x, y, z]) => {

// ═══════════════════════════════════════════════════════════
//  NAVIGATION — PLAYER / CONTROLS
// ═══════════════════════════════════════════════════════════

// Controls: PointerLock for desktop, direct camera manipulation for mobile
let controls = null;
let playerObj;  // unified reference: object whose .position we update

if (!isMobile) {
  controls = new PointerLockControls(camera, renderer.domElement);
  scene.add(controls.getObject());
  // Start position: entry vestibule, facing into apartment
  controls.getObject().position.set(1.5, 1.65, 6.8);
  playerObj = controls.getObject();
} else {
  // Mobile: camera is controlled directly, no pointer lock
  camera.position.set(1.5, 1.65, 6.8);
  camera.rotation.order = 'YXZ';
  playerObj = camera;
}

const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true; });
window.addEventListener('keyup',   e => { keys[e.code] = false; });

const velocity   = new THREE.Vector3();
const direction  = new THREE.Vector3();
const moveSpeed  = 4.0;
const accel      = 10.0;
const decel      = 14.0;
let   clock      = new THREE.Clock();
let   bobTime    = 0;

// ═══════════════════════════════════════════════════════════
//  MOBILE STATE & TOUCH CONTROLS
// ═══════════════════════════════════════════════════════════
let mobileActive  = false;
let autoWalk      = false;
let lastRightTap  = 0;

const JOYSTICK_RADIUS = 60;    // max knob displacement in px
const LOOK_SENS       = 0.0028; // radians per pixel
const PITCH_LIMIT     = Math.PI * 0.42;

// Touch tracking objects
const joyTouch  = { id: null, baseX: 0, baseY: 0, dx: 0, dy: 0 };
const lookTouch = { id: null, lastX: 0, lastY: 0 };

if (isMobile) {
  const joystickZoneEl = document.getElementById('joystick-zone');
  const joystickBaseEl = document.getElementById('joystick-base');
  const joystickKnobEl = document.getElementById('joystick-knob');
  const lookZoneEl     = document.getElementById('look-zone');
  const autowalkBadge  = document.getElementById('autowalk-badge');
  const orientPrompt   = document.getElementById('orient-prompt');

  // Show touch zones
  joystickZoneEl.style.display = 'block';
  lookZoneEl.style.display     = 'block';

  // Update hint text for mobile
  document.getElementById('hint').innerHTML = 'Joystick: Mover &nbsp;|&nbsp; Arrastrar: Mirar';

  // Update button text for mobile
  document.getElementById('ld-btn').textContent = 'Visita Virtual · Toca para comenzar';

  // ── JOYSTICK (left half) ──
  joystickZoneEl.addEventListener('touchstart', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (joyTouch.id === null) {
        joyTouch.id    = t.identifier;
        joyTouch.baseX = t.clientX;
        joyTouch.baseY = t.clientY;
        joyTouch.dx    = 0;
        joyTouch.dy    = 0;
        // Position base centred at touch point
        joystickBaseEl.style.left    = (t.clientX - 60) + 'px';
        joystickBaseEl.style.top     = (t.clientY - 60) + 'px';
        joystickBaseEl.style.display = 'flex';
        joystickKnobEl.style.transform = '';
      }
    }
  }, { passive: false });

  joystickZoneEl.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (t.identifier === joyTouch.id) {
        let dx = t.clientX - joyTouch.baseX;
        let dy = t.clientY - joyTouch.baseY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > JOYSTICK_RADIUS) {
          dx = dx / dist * JOYSTICK_RADIUS;
          dy = dy / dist * JOYSTICK_RADIUS;
        }
        joyTouch.dx = dx;
        joyTouch.dy = dy;
        joystickKnobEl.style.transform = `translate(${dx}px, ${dy}px)`;
      }
    }
  }, { passive: false });

  const joyEnd = e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (t.identifier === joyTouch.id) {
        joyTouch.id = null;
        joyTouch.dx = 0;
        joyTouch.dy = 0;
        joystickKnobEl.style.transform = '';
        joystickBaseEl.style.display   = 'none';
      }
    }
  };
  joystickZoneEl.addEventListener('touchend',    joyEnd, { passive: false });
  joystickZoneEl.addEventListener('touchcancel', joyEnd, { passive: false });

  // ── LOOK / CAMERA DRAG (right half) ──
  lookZoneEl.addEventListener('touchstart', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (lookTouch.id === null) {
        lookTouch.id    = t.identifier;
        lookTouch.lastX = t.clientX;
        lookTouch.lastY = t.clientY;
      }
      // Double-tap → toggle auto-walk
      const now = Date.now();
      if (now - lastRightTap < 350) {
        autoWalk = !autoWalk;
        autowalkBadge.classList.toggle('on', autoWalk);
      }
      lastRightTap = now;
    }
  }, { passive: false });

  lookZoneEl.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (t.identifier === lookTouch.id) {
        const ddx = t.clientX - lookTouch.lastX;
        const ddy = t.clientY - lookTouch.lastY;
        lookTouch.lastX = t.clientX;
        lookTouch.lastY = t.clientY;
        // Apply yaw & pitch directly to camera rotation
        camera.rotation.y -= ddx * LOOK_SENS;
        camera.rotation.x -= ddy * LOOK_SENS;
        camera.rotation.x  = Math.max(-PITCH_LIMIT, Math.min(PITCH_LIMIT, camera.rotation.x));
      }
    }
  }, { passive: false });

  const lookEnd = e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (t.identifier === lookTouch.id) lookTouch.id = null;
    }
  };
  lookZoneEl.addEventListener('touchend',    lookEnd, { passive: false });
  lookZoneEl.addEventListener('touchcancel', lookEnd, { passive: false });

  // ── ORIENTATION LOCK / PROMPT ──
  function checkOrientation() {
    const isPortrait = window.innerHeight > window.innerWidth;
    orientPrompt.classList.toggle('show', isPortrait);
  }
  checkOrientation();
  window.addEventListener('resize', checkOrientation);

  // Request landscape lock if API is available
  if (screen.orientation && screen.orientation.lock) {
    screen.orientation.lock('landscape').catch(() => {});
  }
}

// ═══════════════════════════════════════════════════════════
//  COLLISION DETECTION — axis-by-axis sliding
// ═══════════════════════════════════════════════════════════
function resolveCollisions(pos) {
  // Hard room boundary
  const BOUNDS = { minX: 0.3, maxX: 5.7, minZ: -1.75, maxZ: 11.2 };
  // Some areas the player can go
  // Use AABB collidables list
  for (const b of collidables) {
    const inX = pos.x > b.minX && pos.x < b.maxX;
    const inZ = pos.z > b.minZ && pos.z < b.maxZ;
    if (inX && inZ) {
      // Find shallowest penetration axis
      const overlapPosX = b.maxX - pos.x;
      const overlapNegX = pos.x - b.minX;
      const overlapPosZ = b.maxZ - pos.z;
      const overlapNegZ = pos.z - b.minZ;
      const minOverlap = Math.min(overlapPosX, overlapNegX, overlapPosZ, overlapNegZ);
      if (minOverlap === overlapPosX) pos.x = b.maxX;
      else if (minOverlap === overlapNegX) pos.x = b.minX;
      else if (minOverlap === overlapPosZ) pos.z = b.maxZ;
      else pos.z = b.minZ;
    }
  }
  // Room outer walls
  pos.x = Math.max(0.3, Math.min(5.7, pos.x));
  pos.z = Math.max(-1.75, Math.min(11.2, pos.z));

  // Also prevent going into out-of-bounds gaps between rooms
  // e.g. can't go into bathroom area (x=4–6, z=5–7.5) without passing through hallway
  // These are handled by wall geometry collidables above
}

// ═══════════════════════════════════════════════════════════
//  ROOM DETECTION
// ═══════════════════════════════════════════════════════════
function getCurrentRoom(x, z) {
  if (z >= -2 && z < 0     && x >= 0 && x <= 6)   return 'terrace';
  if (z >= 0  && z < 5     && x >= 0 && x <= 6)   return 'ldk';
  if (z >= 5  && z < 7.5   && x >= 0 && x <  4)   return 'hallway';
  if (z >= 5  && z < 7.5   && x >= 4 && x <= 6)   return 'bathroom';
  if (z >= 7.5 && z <= 11  && x >= 0 && x <  3)   return 'bed1';
  if (z >= 7.5 && z <= 11  && x >= 3 && x <= 6)   return 'bed2';
  return null;
}

// ═══════════════════════════════════════════════════════════
//  MINIMAP
// ═══════════════════════════════════════════════════════════
const mmCanvas = document.getElementById('mm-canvas');
const mmCtx    = mmCanvas.getContext('2d');
const mmW = 160, mmH = 180;

// Floor plan bounds: x=[0,6], z=[-2,11] → 6m × 13m
const mmScale  = Math.min(mmW / 6, mmH / 13) * 0.85;
const mmOffX   = (mmW - 6 * mmScale) * 0.5;
const mmOffY   = (mmH - 13 * mmScale) * 0.5;

function worldToMM(wx, wz) {
  return [mmOffX + wx * mmScale, mmH - (mmOffY + (wz + 2) * mmScale)];
}

function drawMinimap(playerX, playerZ, playerAngle) {
  mmCtx.clearRect(0, 0, mmW, mmH);
  mmCtx.fillStyle = 'rgba(10,14,24,0.0)';
  mmCtx.fillRect(0, 0, mmW, mmH);

  // Room fills
  const roomDefs = [
    { x0:0,x1:6,   z0:0,  z1:5,   col:'rgba(212,165,116,0.35)' },
    { x0:0,x1:4,   z0:5,  z1:7.5, col:'rgba(212,165,116,0.28)' },
    { x0:4,x1:6,   z0:5,  z1:7.5, col:'rgba(138,138,138,0.35)' },
    { x0:0,x1:3,   z0:7.5,z1:11,  col:'rgba(212,165,116,0.28)' },
    { x0:3,x1:6,   z0:7.5,z1:11,  col:'rgba(212,165,116,0.28)' },
    { x0:0,x1:6,   z0:-2, z1:0,   col:'rgba(180,220,180,0.30)' },
  ];
  roomDefs.forEach(r => {
    const [x0, y0] = worldToMM(r.x0, r.z0);
    const [x1, y1] = worldToMM(r.x1, r.z1);
    mmCtx.fillStyle = r.col;
    mmCtx.fillRect(Math.min(x0,x1), Math.min(y0,y1), Math.abs(x1-x0), Math.abs(y1-y0));
  });

  // Walls (room outlines)
  mmCtx.strokeStyle = 'rgba(255,255,255,0.55)';
  mmCtx.lineWidth = 1.2;
  roomDefs.forEach(r => {
    const [x0, y0] = worldToMM(r.x0, r.z0);
    const [x1, y1] = worldToMM(r.x1, r.z1);
    mmCtx.strokeRect(Math.min(x0,x1), Math.min(y0,y1), Math.abs(x1-x0), Math.abs(y1-y0));
  });

  // Door markers (small gaps in walls)
  mmCtx.strokeStyle = 'rgba(0,0,0,0)';
  // (simplified — just visual indicator)

  // Player dot
  const [px, py] = worldToMM(playerX, playerZ);
  mmCtx.save();
  mmCtx.translate(px, py);
  mmCtx.rotate(-playerAngle);
  // FOV cone
  mmCtx.beginPath();
  mmCtx.moveTo(0, 0);
  const fovR = 12, fovA = Math.PI / 3;
  mmCtx.arc(0, 0, fovR, -fovA * 0.5, fovA * 0.5);
  mmCtx.closePath();
  mmCtx.fillStyle = 'rgba(196,165,90,0.25)';
  mmCtx.fill();
  // Dot
  mmCtx.beginPath();
  mmCtx.arc(0, 0, 3.5, 0, Math.PI * 2);
  mmCtx.fillStyle = '#c4a55a';
  mmCtx.fill();
  mmCtx.strokeStyle = '#fff';
  mmCtx.lineWidth = 1;
  mmCtx.stroke();
  mmCtx.restore();

  // North indicator
  mmCtx.fillStyle = 'rgba(255,255,255,0.3)';
  mmCtx.font = '8px Helvetica Neue';
  mmCtx.textAlign = 'right';
  mmCtx.fillText('N↑', mmW - 4, 12);
}

// ═══════════════════════════════════════════════════════════
//  UI STATE
// ═══════════════════════════════════════════════════════════
let  currentRoom      = '';
let  roomLabelTimeout = null;
const roomLabel  = document.getElementById('room-label');
const xhair      = document.getElementById('xhair');
const hintEl     = document.getElementById('hint');
const pauseEl    = document.getElementById('pause');
const minimapEl  = document.getElementById('minimap');

function showRoomLabel(name) {
  if (name === currentRoom) return;
  currentRoom = name;
  if (!name) { roomLabel.classList.remove('show'); return; }
  roomLabel.textContent = name;
  roomLabel.classList.add('show');
  if (roomLabelTimeout) clearTimeout(roomLabelTimeout);
  roomLabelTimeout = setTimeout(() => roomLabel.classList.remove('show'), 2800);
}

// ═══════════════════════════════════════════════════════════
//  ANIMATION LOOP
// ═══════════════════════════════════════════════════════════
let paused = false;

function animate() {
  requestAnimationFrame(animate);
  if (paused) return;

  const dt  = Math.min(clock.getDelta(), 0.05);
  const pos = playerObj.position;

  // isActive: pointer-locked on desktop, mobileActive flag on mobile
  const isActive = isMobile ? mobileActive : (controls && controls.isLocked);

  if (isActive) {
    // ── Movement direction ──
    direction.set(0, 0, 0);

    if (isMobile) {
      // Joystick: dx > 0 = right, dy > 0 = down (screen-Y). Forward = -Z = dy < 0.
      direction.x =  joyTouch.dx / JOYSTICK_RADIUS;
      direction.z =  joyTouch.dy / JOYSTICK_RADIUS; // dy negative = forward = -Z ✓
      // Auto-walk forces full forward regardless of joystick
      if (autoWalk) direction.z = -1;
      if (direction.lengthSq() > 1) direction.normalize();
    } else {
      if (keys['KeyW'] || keys['ArrowUp'])    direction.z -= 1;
      if (keys['KeyS'] || keys['ArrowDown'])  direction.z += 1;
      if (keys['KeyA'] || keys['ArrowLeft'])  direction.x -= 1;
      if (keys['KeyD'] || keys['ArrowRight']) direction.x += 1;
      if (direction.lengthSq() > 0) direction.normalize();
    }

    // Transform direction relative to camera yaw
    const euler = new THREE.Euler(0, 0, 0, 'YXZ');
    euler.setFromQuaternion(camera.quaternion);
    const yaw  = euler.y;
    const sinY = Math.sin(yaw), cosY = Math.cos(yaw);
    const worldX = direction.x * cosY + direction.z * sinY;
    const worldZ = direction.x * (-sinY) + direction.z * cosY;

    // Smooth velocity
    const isMoving = direction.lengthSq() > 0;
    if (isMoving) {
      velocity.x += (worldX * moveSpeed - velocity.x) * Math.min(accel * dt, 1);
      velocity.z += (worldZ * moveSpeed - velocity.z) * Math.min(accel * dt, 1);
    } else {
      velocity.x *= Math.max(0, 1 - decel * dt);
      velocity.z *= Math.max(0, 1 - decel * dt);
    }

    // Axis-by-axis sliding collision
    pos.x += velocity.x * dt;
    resolveCollisions(pos);
    pos.z += velocity.z * dt;
    resolveCollisions(pos);

    // Head bob — skip on mobile (comfort + performance)
    if (!isMobile) {
      const speed = Math.sqrt(velocity.x ** 2 + velocity.z ** 2);
      if (speed > 0.3) {
        bobTime += dt * 2.4;
        pos.y = 1.65 + Math.sin(bobTime * Math.PI) * 0.022;
      } else {
        bobTime = 0;
        pos.y += (1.65 - pos.y) * Math.min(10 * dt, 1);
      }
    }

    // Room detection
    const room = getCurrentRoom(pos.x, pos.z);
    if (room && ROOM_DEFS[room]) showRoomLabel(ROOM_DEFS[room].name);

    // Minimap
    euler.setFromQuaternion(camera.quaternion);
    drawMinimap(pos.x, pos.z, euler.y);
  }

  renderer.render(scene, camera);
}

// ═══════════════════════════════════════════════════════════
//  POINTER LOCK + UI EVENTS (desktop only)
// ═══════════════════════════════════════════════════════════
if (!isMobile && controls) {
  controls.addEventListener('lock', () => {
    pauseEl.classList.remove('active');
    xhair.classList.add('on');
    hintEl.classList.add('on');
    minimapEl.classList.add('on');
    paused = false;
  });

  controls.addEventListener('unlock', () => {
    xhair.classList.remove('on');
    hintEl.classList.remove('on');
    pauseEl.classList.add('active');
    paused = false; // still render
  });

  document.getElementById('pause').addEventListener('click', () => {
    if (!controls.isLocked) controls.lock();
  });
}

// Loading screen
let loadProgress = 0;
const ldBar = document.getElementById('ld-bar');
const ldBtn = document.getElementById('ld-btn');
const ldStatus = document.getElementById('ld-status');
const ldEl = document.getElementById('loading');

function setProgress(p) {
  loadProgress = Math.max(loadProgress, p);
  ldBar.style.width = loadProgress + '%';
}

// Simulate loading steps
setProgress(20);
setTimeout(() => { setProgress(50); ldStatus.textContent = 'Generando texturas…'; }, 200);
setTimeout(() => { setProgress(80); ldStatus.textContent = 'Construyendo escena…'; }, 500);
setTimeout(() => {
  setProgress(100);
  ldStatus.textContent = 'Listo.';
  ldBtn.style.display = 'inline-block';
  ldStatus.style.opacity = '0';
}, 900);

function beginTour() {
  if (ldEl.classList.contains('fade-out')) return; // prevent double-fire
  ldEl.classList.add('fade-out');
  setTimeout(() => { ldEl.classList.add('gone'); }, 1300);
  if (isMobile) {
    mobileActive = true;
    minimapEl.classList.add('on');
    hintEl.classList.add('on');
  } else {
    controls.lock();
  }
}
ldBtn.addEventListener('click', beginTour);
ldBtn.addEventListener('touchend', e => { e.preventDefault(); beginTour(); });

// ESC pause behaviour (browser unlocks pointer — handled by controls.unlock event)
window.addEventListener('keydown', e => {
  if (e.code === 'Escape' && controls && controls.isLocked) {
    // browser auto-unlocks, our unlock handler shows pause screen
  }
});

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Start rendering ───
clock.start();
animate();
