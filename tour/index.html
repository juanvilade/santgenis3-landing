<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

// ════════════════════════════════════════════════════════════════
//  SETUP
// ════════════════════════════════════════════════════════════════

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0xb8d4e8, 0.012);

const camera = new THREE.PerspectiveCamera(72, innerWidth / innerHeight, 0.05, 200);
// Start in entrance hall, facing west into apartment
camera.position.set(5.0, 1.65, 0.2);
camera.rotation.y = Math.PI; // face west

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

// ════════════════════════════════════════════════════════════════
//  CONTROLS
// ════════════════════════════════════════════════════════════════

const controls = new PointerLockControls(camera, renderer.domElement);

const overlay    = document.getElementById('overlay');
const paused     = document.getElementById('paused');
const crosshair  = document.getElementById('crosshair');
const brand      = document.getElementById('brand');
const roomLabel  = document.getElementById('room-label');
const hintsEl    = document.getElementById('controls-hint');
const compassWrap = document.getElementById('compass-wrap');
const startBtn   = document.getElementById('startBtn');

function showHUD(visible) {
  const d = visible ? 'block' : 'none';
  crosshair.style.display  = visible ? 'block' : 'none';
  brand.style.display      = d;
  roomLabel.style.display  = d;
  hintsEl.style.display    = d;
  compassWrap.style.display = d;
}

startBtn.addEventListener('click', () => controls.lock());

controls.addEventListener('lock', () => {
  overlay.classList.add('hidden');
  paused.style.display = 'none';
  showHUD(true);
});

controls.addEventListener('unlock', () => {
  paused.style.display = 'flex';
  showHUD(false);
});

paused.addEventListener('click', () => controls.lock());

// ════════════════════════════════════════════════════════════════
//  KEYBOARD
// ════════════════════════════════════════════════════════════════

const keys = {};
addEventListener('keydown', e => { keys[e.code] = true; });
addEventListener('keyup',   e => { keys[e.code] = false; });

// ════════════════════════════════════════════════════════════════
//  PROCEDURAL TEXTURES
// ════════════════════════════════════════════════════════════════

function mkTex(fn) {
  const c = document.createElement('canvas');
  fn(c);
  const t = new THREE.CanvasTexture(c);
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}

const woodTex = mkTex(c => {
  c.width = c.height = 512;
  const ctx = c.getContext('2d');
  const g = ctx.createLinearGradient(0, 0, 512, 0);
  g.addColorStop(0,   '#c8956a');
  g.addColorStop(0.3, '#d4a574');
  g.addColorStop(0.7, '#ca9d6c');
  g.addColorStop(1,   '#d8aa7a');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, 512, 512);
  // Grain lines
  for (let i = 0; i < 40; i++) {
    const y0 = (512 / 40) * i;
    ctx.beginPath();
    ctx.moveTo(0, y0);
    for (let x = 0; x <= 512; x += 16) {
      ctx.lineTo(x, y0 + (Math.random() - 0.5) * 4);
    }
    const a = 0.03 + Math.random() * 0.08;
    ctx.strokeStyle = `rgba(0,0,0,${a})`;
    ctx.lineWidth = 0.5 + Math.random() * 1.5;
    ctx.stroke();
  }
  // Board divisions
  for (let i = 0; i < 4; i++) {
    const y = (512 / 4) * i;
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    ctx.fillRect(0, y, 512, 1);
  }
});
woodTex.wrapS = woodTex.wrapT = THREE.RepeatWrapping;
woodTex.repeat.set(3, 3);

const tileTex = mkTex(c => {
  c.width = c.height = 256;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#a0a0a0';
  ctx.fillRect(0, 0, 256, 256);
  for (let x = 0; x < 256; x += 64) {
    for (let y = 0; y < 256; y += 64) {
      ctx.fillStyle = `rgba(${140 + Math.random()*15},${140 + Math.random()*15},${140 + Math.random()*15},1)`;
      ctx.fillRect(x + 1, y + 1, 62, 62);
    }
  }
  ctx.fillStyle = 'rgba(80,80,80,0.8)';
  for (let x = 0; x <= 256; x += 64) { ctx.fillRect(x - 1, 0, 2, 256); }
  for (let y = 0; y <= 256; y += 64) { ctx.fillRect(0, y - 1, 256, 2); }
});
tileTex.wrapS = tileTex.wrapT = THREE.RepeatWrapping;
tileTex.repeat.set(3, 3);

const paverTex = mkTex(c => {
  c.width = c.height = 512;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#8c8c8c';
  ctx.fillRect(0, 0, 512, 512);
  const pw = 128, ph = 64;
  for (let row = 0; row < 9; row++) {
    const off = (row % 2) * (pw / 2);
    for (let col = -1; col < 6; col++) {
      const lx = col * pw + off, ly = row * ph;
      const shade = 130 + Math.floor(Math.random() * 20);
      ctx.fillStyle = `rgb(${shade},${shade},${shade - 5})`;
      ctx.fillRect(lx + 2, ly + 2, pw - 4, ph - 4);
    }
  }
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 3;
  for (let row = 0; row < 9; row++) {
    const off = (row % 2) * (pw / 2);
    for (let col = -1; col < 6; col++) {
      ctx.strokeRect(col * pw + off, row * ph, pw, ph);
    }
  }
});
paverTex.wrapS = paverTex.wrapT = THREE.RepeatWrapping;
paverTex.repeat.set(2, 2);

// ════════════════════════════════════════════════════════════════
//  MATERIALS
// ════════════════════════════════════════════════════════════════

function lam(color, opts = {}) {
  return new THREE.MeshLambertMaterial({ color, ...opts });
}

const M = {
  wall:        lam(0xf5f5f0),
  ceiling:     lam(0xffffff),
  floor:       new THREE.MeshLambertMaterial({ map: woodTex }),
  bathFloor:   new THREE.MeshLambertMaterial({ map: tileTex }),
  terFloor:    new THREE.MeshLambertMaterial({ map: paverTex }),
  door:        lam(0xfafaf8),
  winFrame:    lam(0x8a8a8a),
  winGlass:    lam(0x9abfcc, { transparent: true, opacity: 0.18, side: THREE.DoubleSide }),
  slidingGlass: lam(0x9abfcc, { transparent: true, opacity: 0.12, side: THREE.DoubleSide }),
  glassRail:   lam(0xc0dae0, { transparent: true, opacity: 0.25, side: THREE.DoubleSide }),
  railTop:     lam(0x888888),
  sofa:        lam(0x3d3d3d),
  sofaLight:   lam(0x4a4a4a),
  cushion:     lam(0x6a6a6a),
  coffeeTable: lam(0x7a5c2e),
  tv:          lam(0x111111),
  tvScreen:    lam(0x0a0f1e, { emissive: 0x050810, emissiveIntensity: 0.5 }),
  tvStand:     lam(0x2a2a2a),
  kitchenCab:  lam(0xf0f0ee),
  kitchenCtr:  lam(0x4a4a4a),
  kitchenTop:  lam(0x3c3c3c),
  sink:        lam(0x888888),
  bedFrame:    lam(0xf0efed),
  bed1:        lam(0x5b7fa6),  // blue bedding
  bed2:        lam(0x8a5a6a),  // dusty rose
  pillow1:     lam(0xeef2f6),
  pillow2:     lam(0xf5eeee),
  wardrobe:    lam(0xf5f4f2),
  wardrobeDet: lam(0xd8d5d0),
  bathtub:     lam(0xfafafa),
  shower:      lam(0x9ab5b8, { transparent: true, opacity: 0.35, side: THREE.DoubleSide }),
  showerBase:  lam(0xcccccc),
  toilet:      lam(0xffffff),
  vanity:      lam(0xf0f0ee),
  vanityTop:   lam(0x777777),
  mirror:      new THREE.MeshPhongMaterial({ color: 0xc8e0e8, shininess: 200, specular: 0x88aacc }),
  chairOut:    lam(0xc8c8c4),
  tableOut:    lam(0xb4b4b0),
  plant:       lam(0x3a7a3a),
  pot:         lam(0x9a5c3a),
  ground:      lam(0x5a5850),
  building:    lam(0x4a4a58),
  buildingLit: lam(0x5a5870),
  mountain:    lam(0x3a5040),
  mountainDk:  lam(0x2d3d30),
  sky:         new THREE.MeshBasicMaterial({ color: 0x6ab4d8, side: THREE.BackSide }),
  skyHorizon:  lam(0xd0e8f0),
  ground2:     lam(0x4a4a3a),
  floorSlab:   lam(0x3a3a3a),
};

// ════════════════════════════════════════════════════════════════
//  SCENE HELPERS
// ════════════════════════════════════════════════════════════════

function mesh(geo, mat, x, y, z, rx, ry, rz) {
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x, y, z);
  if (rx) m.rotation.x = rx;
  if (ry) m.rotation.y = ry;
  if (rz) m.rotation.z = rz;
  m.castShadow = true;
  m.receiveShadow = true;
  scene.add(m);
  return m;
}

function box(x, y, z, w, h, d, mat) {
  return mesh(new THREE.BoxGeometry(w, h, d), mat, x, y, z);
}

function cyl(x, y, z, rt, rb, h, mat, segs) {
  return mesh(new THREE.CylinderGeometry(rt, rb, h, segs || 12), mat, x, y, z);
}

// Wall height & thickness constants
const WH = 2.70;   // wall height
const WT = 0.12;   // wall thickness
const HWH = WH / 2; // half wall height (for centering)

// A standard wall (box centered at y=HWH)
function mkWall(x, z, w, d, mat) {
  box(x, HWH, z, w, WH, d, mat || M.wall);
}

// Wall with a door opening (split into up-to-3 segments + lintel)
// doorCX = center X of door in the wall (for walls running east-west)
// doorCZ = center Z of door (for walls running north-south)
function mkWallWithDoor(x, z, wallW, wallD, doorCX, doorCZ, doorW, mat) {
  mat = mat || M.wall;
  const dh = 2.10;  // door height
  const lintelH = WH - dh;

  if (doorCX !== null) {
    // Wall runs along X axis (east-west wall at fixed Z)
    // Split into left, right, and lintel
    const leftW = (x - wallW/2 + wallW/2) - (doorCX - doorW/2) - (x - wallW/2);
    const rightW = (x + wallW/2) - (doorCX + doorW/2);
    const leftCX = x - wallW/2 + leftW/2;
    const rightCX = doorCX + doorW/2 + rightW/2;

    if (leftW > 0.01)  box(leftCX,  HWH,    z, leftW,  WH,       wallD, mat);
    if (rightW > 0.01) box(rightCX, HWH,    z, rightW, WH,       wallD, mat);
    box(doorCX, dh + lintelH/2, z, doorW, lintelH, wallD, mat); // lintel
    // Door frame visual (thin)
    box(doorCX - doorW/2 - 0.02, dh/2, z, 0.04, dh, wallD + 0.01, M.door);
    box(doorCX + doorW/2 + 0.02, dh/2, z, 0.04, dh, wallD + 0.01, M.door);
    box(doorCX, dh + 0.02, z, doorW + 0.04, 0.04, wallD + 0.01, M.door);
  } else {
    // Wall runs along Z axis (north-south wall at fixed X), doorCZ is door center
    const frontW = doorCZ - doorW/2 - (z - wallD/2);
    const backW  = (z + wallD/2) - (doorCZ + doorW/2);
    const frontCZ = z - wallD/2 + frontW/2;
    const backCZ  = doorCZ + doorW/2 + backW/2;

    if (frontW > 0.01)  box(x, HWH,    frontCZ, wallW, WH,       frontW, mat);
    if (backW > 0.01)   box(x, HWH,    backCZ,  wallW, WH,       backW,  mat);
    box(x, dh + lintelH/2, doorCZ, wallW, lintelH, doorW, mat);
    box(x, dh/2, doorCZ - doorW/2 - 0.02, wallW + 0.01, dh, 0.04, M.door);
    box(x, dh/2, doorCZ + doorW/2 + 0.02, wallW + 0.01, dh, 0.04, M.door);
    box(x, dh + 0.02, doorCZ, wallW + 0.01, 0.04, doorW + 0.04, M.door);
  }
}

// ════════════════════════════════════════════════════════════════
//  COLLISION — walls as obstacles (AABB approach)
// ════════════════════════════════════════════════════════════════

const PR  = 0.22;  // player radius (metres)
const WT2 = WT / 2;

// Interior wall segments — each is a {minX,maxX,minZ,maxZ} box
// Doors create gaps; only the SOLID parts are added here.
const wallBoxes = [];
function addWB(minX, maxX, minZ, maxZ) { wallBoxes.push({minX, maxX, minZ, maxZ}); }

{
  const DW = 0.85; // door width
  const hw = WT2;  // half-wall thickness

  // ── Wall at z = -0.50 (bedroom zone / hallway): 3 doors ──
  // Master bed door centre x=-3.50 → gap x:[-3.925, -3.075]
  // Bed-2 door   centre x= 0.00 → gap x:[-0.425,  0.425]
  // Bathroom door centre x= 2.75 → gap x:[ 2.325,  3.175]
  addWB(-5.50,    -3.925,  -0.50 - hw, -0.50 + hw); // west section
  addWB(-3.075,   -0.425,  -0.50 - hw, -0.50 + hw); // mid-1
  addWB( 0.425,    2.325,  -0.50 - hw, -0.50 + hw); // mid-2
  addWB( 3.175,    4.00,   -0.50 - hw, -0.50 + hw); // east of bath door
  addWB( 4.00,     5.50,   -0.50 - hw, -0.50 + hw); // entry hall north

  // ── Vertical partitions (north-south) ──
  addWB(-1.50 - hw, -1.50 + hw,  -3.50, -0.50); // master bed / bed-2
  addWB( 1.50 - hw,  1.50 + hw,  -3.50, -0.50); // bed-2 / bathroom
  addWB( 4.00 - hw,  4.00 + hw,  -3.50, -0.50); // bathroom east
  addWB( 4.00 - hw,  4.00 + hw,   0.50,  1.00); // entry hall south stub

  // ── Terrace railings (1 m tall solid rails) ──
  addWB(-2.05,  2.05,   5.97, 6.05); // south railing
  addWB( 1.97,  2.05,   3.50, 6.00); // east railing
  addWB(-2.05, -1.97,   3.50, 6.00); // west railing
}

function isNavigable(nx, nz) {
  // ── Exterior bounds ──
  if (nx < -5.36 || nx > 5.36) return false;   // west/east walls
  if (nz < -3.36) return false;                  // north wall

  // East wall has front door gap at z [0.05, 0.90]
  if (nx > 5.26 && !(nz > 0.05 && nz < 0.90)) return false;

  // South wall at z = 3.50: only open where the sliding door is (x: -1.05..1.05)
  if (nz > 3.44 && (nx < -1.05 || nx > 1.05) && nz < 3.60) return false;

  // Terrace outer bounds
  if (nz > 5.88) return false;
  if (nz > 3.56 && (nx < -1.88 || nx > 1.88)) return false;

  // ── Interior wall collisions ──
  for (const w of wallBoxes) {
    if (nx + PR > w.minX && nx - PR < w.maxX &&
        nz + PR > w.minZ && nz - PR < w.maxZ) return false;
  }
  return true;
}

function detectRoom(x, z) {
  for (const r of roomZones) {
    if (x >= r.minX && x <= r.maxX && z >= r.minZ && z <= r.maxZ) return r.name;
  }
  return currentRoom;
}

  box(cx - winW/2 - frameT/2, cY, cz, frameT, winH + frameT*2, frameT*2, M.winFrame); // left
  box(cx + winW/2 + frameT/2, cY, cz, frameT, winH + frameT*2, frameT*2, M.winFrame); // right
  // Mid-rail
  box(cx, cY, cz, winW, frameT * 0.5, frameT * 2, M.winFrame);
}

  box(cx, cY, cz + winW/2 + frameT/2, frameT*2, winH + frameT*2, frameT, M.winFrame);

}

//  COMPASS
// ════════════════════════════════════════════════════════════════

const compassCanvas = document.getElementById('compass-canvas');
const compassCtx    = compassCanvas.getContext('2d');

function drawCompass(heading) {
  const w = 96, h = 96, cx = w/2, cy = h/2, r = 40;
  compassCtx.clearRect(0, 0, w, h);

  // Background
  compassCtx.beginPath();
  compassCtx.arc(cx, cy, r + 4, 0, Math.PI * 2);
  compassCtx.fillStyle = 'rgba(10,14,26,0.7)';
  compassCtx.fill();
  compassCtx.strokeStyle = 'rgba(201,169,110,0.3)';
  compassCtx.lineWidth = 1;
  compassCtx.stroke();

  // Cardinal marks
  const cards = [['N', 0], ['E', 90], ['S', 180], ['O', 270]];
  compassCtx.font = '9px Helvetica Neue, sans-serif';
  compassCtx.textAlign = 'center';
  compassCtx.textBaseline = 'middle';
  for (const [label, deg] of cards) {
    const a = (deg - heading) * Math.PI / 180 - Math.PI / 2;
    const mx = cx + Math.cos(a) * (r - 8);
    const my = cy + Math.sin(a) * (r - 8);
    compassCtx.fillStyle = label === 'N' ? '#c9a96e' : 'rgba(255,255,255,0.5)';
    compassCtx.fillText(label, mx, my);
  }

  // Needle
  const na = -heading * Math.PI / 180 - Math.PI / 2;
  // North needle (gold)
  compassCtx.beginPath();
  compassCtx.moveTo(cx, cy);
  compassCtx.lineTo(cx + Math.cos(na) * (r - 18), cy + Math.sin(na) * (r - 18));
  compassCtx.strokeStyle = '#c9a96e';
  compassCtx.lineWidth = 2.5;
  compassCtx.lineCap = 'round';
  compassCtx.stroke();
  // South needle (grey)
  compassCtx.beginPath();
  compassCtx.moveTo(cx, cy);
  compassCtx.lineTo(cx - Math.cos(na) * (r - 24), cy - Math.sin(na) * (r - 24));
  compassCtx.strokeStyle = 'rgba(255,255,255,0.3)';
  compassCtx.lineWidth = 2;
  compassCtx.stroke();

  // Center dot
  compassCtx.beginPath();
  compassCtx.arc(cx, cy, 3, 0, Math.PI * 2);
  compassCtx.fillStyle = '#c9a96e';
  compassCtx.fill();
}

// ════════════════════════════════════════════════════════════════
//  MOVEMENT & ANIMATION
// ════════════════════════════════════════════════════════════════

const clock  = new THREE.Clock();
const moveV  = new THREE.Vector3();
const camDir = new THREE.Vector3();
const rightDir = new THREE.Vector3();
const UP = new THREE.Vector3(0, 1, 0);

let currentRoom = 'Entrada';
let roomTransTimer = 0;

// Fake "loading" bar animation
let loadPct = 0;
const loadBar = document.getElementById('loading-bar');
const loadInterval = setInterval(() => {
  loadPct = Math.min(100, loadPct + (Math.random() * 8 + 3));
  loadBar.style.width = loadPct + '%';
  if (loadPct >= 100) {
    clearInterval(loadInterval);
    startBtn.textContent = '▶  Click para comenzar';
    startBtn.style.opacity = '1';
  }
}, 120);

function animate() {
  requestAnimationFrame(animate);

  const delta = Math.min(clock.getDelta(), 0.05); // cap at 50ms

  if (controls.isLocked) {
    const speed = 3.8;
    const fw = (keys['KeyW'] || keys['ArrowUp'])    ? 1 : 0;
    const bk = (keys['KeyS'] || keys['ArrowDown'])  ? 1 : 0;
    const lf = (keys['KeyA'] || keys['ArrowLeft'])  ? 1 : 0;
    const rt = (keys['KeyD'] || keys['ArrowRight']) ? 1 : 0;

    if (fw || bk || lf || rt) {
      camera.getWorldDirection(camDir);
      camDir.y = 0;
      camDir.normalize();
      rightDir.crossVectors(camDir, UP).normalize();

      moveV.set(0, 0, 0);
      moveV.addScaledVector(camDir,  (fw - bk) * speed * delta);
      moveV.addScaledVector(rightDir, (rt - lf) * speed * delta);

      const oldX = camera.position.x;
      const oldZ = camera.position.z;
      const newX = oldX + moveV.x;
      const newZ = oldZ + moveV.z;

      // Attempt full move, then axis-by-axis fallback
      if (isNavigable(newX, newZ)) {
        camera.position.x = newX;
        camera.position.z = newZ;
      } else if (isNavigable(newX, oldZ)) {
        camera.position.x = newX;
      } else if (isNavigable(oldX, newZ)) {
        camera.position.z = newZ;
      }
    }

    // Lock height
    camera.position.y = 1.65;

    // Room detection
    const room = detectRoom(camera.position.x, camera.position.z);
    if (room !== currentRoom) {
      currentRoom = room;
      roomLabel.textContent = room;
      roomLabel.style.opacity = '0';
      setTimeout(() => { roomLabel.style.opacity = '1'; }, 50);
    }

    // Compass
    const heading = -camera.rotation.y * 180 / Math.PI;
    drawCompass(heading);
  }

  renderer.render(scene, camera);
}

animate();
